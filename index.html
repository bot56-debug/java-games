<!DOCTYPE html>
<html>
<head>
    <title>Web Flappy Bird</title>
    <style>
        body { text-align: center; background: #333; color: white; font-family: Arial; margin-top: 50px; }
        canvas { border: 2px solid #000; background: cyan; display: block; margin: 20px auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <h1>Flappy Bird Web</h1>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <p>Press <b>Space</b> or <b>Click</b> to Jump</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let birdY = 250, velocity = 0, gravity = 0.15, score = 0, highScore = 0;
        let pipeX = 400, pipeHeight = 200, gap = 150, state = "MENU";
        const birdImg = new Image(); 
        birdImg.src = "bird.png"; 

        function draw() {
            // Background
            ctx.fillStyle = "cyan";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (state === "MENU") {
                ctx.fillStyle = "black";
                ctx.font = "bold 30px Arial";
                ctx.fillText("FLAPPY BIRD", 100, 200);
                ctx.font = "20px Arial";
                ctx.fillText("Click to Start", 140, 300);
                if(birdImg.complete) ctx.drawImage(birdImg, 180, 240, 40, 40);
            } 
            else if (state === "PLAYING") {
                velocity += gravity;
                birdY += velocity;
                pipeX -= 2;

                if (pipeX < -60) {
                    pipeX = 400;
                    pipeHeight = Math.random() * 200 + 100;
                    score++;
                    if(score > highScore) highScore = score;
                }

                // Drawing Pipes
                ctx.fillStyle = "green";
                ctx.fillRect(pipeX, 0, 60, pipeHeight);
                ctx.fillRect(pipeX, pipeHeight + gap, 60, canvas.height);

                // Drawing Bird
                if(birdImg.complete) ctx.drawImage(birdImg, 100, birdY, 40, 40);
                else { ctx.fillStyle = "yellow"; ctx.fillRect(100, birdY, 40, 40); }

                // Score
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.fillText(score, 190, 50);

                // Collision
                if (birdY > canvas.height || birdY < 0 || (pipeX < 140 && pipeX + 60 > 100 && (birdY < pipeHeight || birdY + 30 > pipeHeight + gap))) {
                    state = "GAMEOVER";
                }
            } 
            else if (state === "GAMEOVER") {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.fillText("GAME OVER", 85, 250);
                ctx.font = "20px Arial";
                ctx.fillText("Score: " + score + " | Best: " + highScore, 110, 300);
            }
            requestAnimationFrame(draw);
        }

        function handleInput() {
            if (state === "MENU" || state === "GAMEOVER") {
                birdY = 250; velocity = 0; pipeX = 400; score = 0;
                state = "PLAYING";
            } else {
                velocity = -5;
            }
        }

       window.addEventListener("keydown", e => { if(e.code === "Space") handleInput(); });
        canvas.addEventListener("mousedown", handleInput);
        
        birdImg.onload = draw;
        birdImg.onerror = draw; // If image fails, start anyway
        
        draw(); // Force the game to start immediately
    </script>
</body>
</html>
    </script>
</body>
</html>
